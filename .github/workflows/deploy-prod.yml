name: Deploy PROD to GitHub Pages

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-prod-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.0.0"
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - name: Prepare public catalog API PROD config
        shell: bash
        env:
          PUBLIC_CATALOG_ENV: production
          PUBLIC_CATALOG_D1_DATABASE_ID: ${{ vars.PROD_PUBLIC_CATALOG_D1_DATABASE_ID }}
          VITE_PUBLIC_CATALOG_API_BASE_URL: ${{ vars.PROD_PUBLIC_CATALOG_API_BASE_URL }}
        run: |
          test -n "${PUBLIC_CATALOG_D1_DATABASE_ID:?PROD_PUBLIC_CATALOG_D1_DATABASE_ID is required}"
          test -n "${VITE_PUBLIC_CATALOG_API_BASE_URL:?PROD_PUBLIC_CATALOG_API_BASE_URL is required}"
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'packages/public-catalog-api/wrangler.jsonc';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          const envName = process.env.PUBLIC_CATALOG_ENV;
          const dbId = process.env.PUBLIC_CATALOG_D1_DATABASE_ID;
          config.env[envName].d1_databases[0].database_id = dbId;
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`, 'utf8');
          NODE

      - name: Apply public catalog API PROD migrations
        run: pnpm --filter @iidx/public-catalog-api exec wrangler d1 migrations apply iidx-public-catalog-prod --remote --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy public catalog API PROD
        run: pnpm --filter @iidx/public-catalog-api exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - run: node scripts/sync-song-master-assets.mjs
      - run: pnpm --filter @iidx/web-app build
        env:
          VITE_BASE_PATH: /iidx_score_attack_manager/
          VITE_PUBLIC_CATALOG_API_BASE_URL: ${{ vars.PROD_PUBLIC_CATALOG_API_BASE_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
